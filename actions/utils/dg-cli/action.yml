name: "dg cli <command>"
description: "Run a dg cli command"
inputs:
  command:
    required: true
    description: "The dg cli command to run"

runs:
  using: "composite"
  steps:
    - id: dg-cli
      run: $GITHUB_ACTION_PATH/../../../generated/gha/dagster-cloud-${{ runner.arch == 'ARM64' && 'aarch64' || 'x86_64' }}.pex -m dagster_dg_cli.cli.entrypoint ${{ inputs.command }}
      shell: bash
